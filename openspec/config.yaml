schema: spec-driven

# Project context
context: |
  Project: CodeMoss - 多 AI 集成桌面应用
  Product version: package.json.version=0.4.12; src-tauri/Cargo.toml.version=0.3.0
  Tooling baseline: OpenSpec CLI 1.3.1; Trellis CLI/project templates 0.4.0
  Tech stack: Tauri 2.9.6 + Rust + React 19.1.0 + TypeScript 5.8.3 + Vite 7.0.4
  Domain: AI 对话助手、项目记忆管理、多引擎集成 (Claude Code + Codex + Gemini)
  Architecture:
    - Frontend: React + TypeScript + Tauri IPC
    - Backend: Rust + Tauri Commands + File-based Storage
    - Storage: JSON (按项目分文件夹 + 按天分桶)
  OpenSpec workspace:
    - Main specs: openspec/specs/* (208 capabilities)
    - Active changes: 6
    - Archived changes: 224
    - Legacy project context remains in openspec/project.md for detailed audit history; this config context is the injected planning context for OpenSpec 1.3.x.
  Conventions:
    - Behavior changes MUST start from an OpenSpec change under openspec/changes/<change-id>/.
    - Trellis tasks MUST reference exactly one OpenSpec change when implementation work is tracked.
    - New capabilities SHOULD use spec-hub-* when they belong to the Spec Hub domain; spec-platform-* is legacy-only.
    - Archive gate requires completed tasks, strict validation, and synced main specs; use --skip-specs only when main specs were already synced.
  Quality Gates:
    - openspec validate --all --strict --no-interactive
    - npm run typecheck
    - npm run test or focused Vitest suites for touched frontend behavior
    - cargo test --manifest-path src-tauri/Cargo.toml for Rust/backend behavior

# Per-artifact rules
rules:
  proposal:
    - 必须包含 "目标与边界" 和 "非目标" 章节
    - 技术方案必须对比至少 2 个选项并说明取舍
    - 包含具体的验收标准
  tasks:
    - 每个任务必须可在 2 小时内完成
    - 包含明确的输入/输出和验证方式
    - 标注依赖关系和优先级
  implementation:
    - 先计划后代码 (禁止直接写代码)
    - 先测试后实现 (TDD 驱动)
    - 最小改动原则 (不扩大影响范围)

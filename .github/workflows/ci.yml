name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  memory-kind-contract:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-kind-contract-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-kind-contract-
      - name: Install CMake
        run: command -v cmake >/dev/null 2>&1 || brew install cmake
      - name: Install dependencies
        run: npm ci
      - name: Prepare Tauri test frontend assets
        run: |
          mkdir -p dist/assets
          printf '<!doctype html><html><body></body></html>\n' > dist/index.html
          printf 'ci placeholder\n' > dist/assets/ci-placeholder.txt
      - name: Memory kind contract tests (Rust + TS)
        run: npm run test:memory-kind-contract

  test-tauri:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: Install CMake
        run: command -v cmake >/dev/null 2>&1 || brew install cmake
      - name: Install dependencies
        run: npm ci
      - name: Prepare Tauri test frontend assets
        run: |
          mkdir -p dist/assets
          printf '<!doctype html><html><body></body></html>\n' > dist/index.html
          printf 'ci placeholder\n' > dist/assets/ci-placeholder.txt
      - name: Rust tests
        run: cargo test
        working-directory: src-tauri
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Runtime contracts
        run: npm run check:runtime-contracts
      - name: Typecheck
        run: npm run typecheck
  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Tests
        run: npm run test
  test-windows:
    runs-on: windows-latest
    needs:
      - lint
      - typecheck
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Windows doctor checks
        run: npm run doctor:win
      - name: Integration tests (Windows)
        env:
          VITEST_INCLUDE_HEAVY: "1"
        run: node scripts/test-batched.mjs
  build-macos:
    runs-on: macos-latest
    needs:
      - lint
      - typecheck
      - test-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
      - name: Install CMake
        run: command -v cmake >/dev/null 2>&1 || brew install cmake
      - name: Install dependencies
        run: npm ci
      - name: Tauri debug build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run tauri -- build --debug --no-bundle

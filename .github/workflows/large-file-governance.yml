name: Large File Governance Sentry

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  large-file-sentry-hard-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Large file governance parser tests
        run: node --test scripts/check-large-files.test.mjs
      - name: Large file governance near-threshold watch
        run: npm run check:large-files:near-threshold
      - name: Large file governance hard-debt gate
        run: npm run check:large-files:gate

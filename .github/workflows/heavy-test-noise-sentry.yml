name: Heavy Test Noise Sentry

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  heavy-test-noise-sentry:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Heavy test noise parser tests
        run: node --test scripts/check-heavy-test-noise.test.mjs
      - name: Heavy test noise gate
        run: npm run check:heavy-test-noise
      - name: Upload heavy test noise log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-test-noise-log
          path: .artifacts/heavy-test-noise.log
          if-no-files-found: ignore
